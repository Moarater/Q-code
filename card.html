<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Plumeria Service - Bewertung Karte (A6)</title>
    <style>
        :root {
            --dark-blue: #1d2a55;
            --light-green: #8bc655;
            --bg-card-color: #e2e8e2; 
        }

        *, *::before, *::after {
            box-sizing: border-box;
        }

        @page {
            size: A6;
            margin: 0;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
            background-color: #ffffff; 
        }

        .card-page {
            width: 105mm;
            height: 148mm;
            position: relative;
            page-break-after: always;
            overflow: hidden;
            background-color: var(--bg-card-color);
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            margin: 40px auto; 
        }

        @media print {
            .card-page {
                margin: 0;
                box-shadow: none;
                background-color: var(--bg-card-color) !important;
            }
        }

        /* ------------------ الوجه الأمامي (FRONT) ------------------ */
        .front-card {
            padding: 12mm 8mm;
            text-align: center;
            display: block;
        }

        .logo-area {
            margin-bottom: 8mm;
            text-align: center;
        }

        .logo-area img {
            width: 50mm;
            height: auto;
        }

        .text-container {
            margin-bottom: 6mm;
        }

        .text-top {
            color: var(--dark-blue);
            font-size: 15pt;
            font-weight: bold;
            margin-bottom: 4mm;
            line-height: 1.3;
        }

        .text-middle {
            color: var(--dark-blue);
            font-size: 10.5pt;
            line-height: 1.4;
        }

        .qr-area {
            text-align: center;
            margin-bottom: 6mm;
        }

        .qr-container {
            background-color: #ffffff;
            padding: 4mm;
            border-radius: 12px;
            border: 2px solid var(--light-green);
            display: inline-block;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .qr-container img {
            width: 32mm;
            height: 32mm;
            display: block;
        }

        .text-bottom {
            color: var(--dark-blue);
            font-size: 14pt;
            font-weight: bold;
            letter-spacing: 0.5px;
            text-align: center;
        }

        /* ------------------ الوجه الخلفي (BACK) ------------------ */
        .back-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center; /* تمركز محتويات الكرت عمودياً */
            padding: 10mm 5mm;
        }

        /* حاوية العبارة العلوية المقسمة لسطرين */
        .headline-container {
            text-align: center;
            width: 100%;
            margin-bottom: 5mm; /* المسافة بين النص والصورة */
        }

        .text-line-1 {
            color: var(--dark-blue);
            font-size: 13pt;
            font-weight: normal;
            display: block;
            margin-bottom: 2mm;
        }

        .text-line-2 {
            color: var(--dark-blue);
            font-size: 18pt;
            font-weight: bold;
            display: block;
            letter-spacing: 0.5px;
        }

        /* حاوية الصورة الخلفية */
        .back-hero-image {
            background-image: url('hero.jpg');
            background-size: 100% 100%;
            background-position: center center;
            background-repeat: no-repeat;
            width: 94.5mm; /* 90% من عرض كرت A6 */
            height: 62mm;  /* زيادة الارتفاع قليلاً لملء الفراغ بعد حذف النص السفلي */
        }
    </style>
</head>
<body>

    <!-- 1. الوجه الأمامي للبطاقة (FRONT) -->
    <div class="card-page front-card">
        <div class="logo-area">
            <img src="Logo.png" alt="Plumeria Service Logo">
        </div>

        <div class="text-container">
            <div class="text-top">Sie waren with uns zufrieden?</div>
            <div class="text-middle">Wir freuen uns über Ihr Feedback auf unserer Google Seite.</div>
        </div>

        <div class="qr-area">
            <div class="qr-container">
                <img src="qr-code.png" alt="Google QR Code">
            </div>
        </div>

        <div class="text-bottom">Vielen Dank!</div>
    </div>

    <!-- 2. الوجه الخلفي للبطاقة (BACK) -->
    <div class="card-page back-card">
        
        <!-- العبارة الألمانية المقسمة لسطرين فوق الصورة مباشرة -->
        <div class="headline-container">
            <span class="text-line-1">Ihre Meinung ist uns</span>
            <span class="text-line-2">WICHTIG!</span>
        </div>
        
        <!-- صورة الغلاف المتمركزة بالكامل بدون أي نصوص أسفلها -->
        <div class="back-hero-image"></div>
        
    </div>

</body>
</html>
