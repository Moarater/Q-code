<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Plumeria Service - Bewertung Karte (A6)</title>
    <style>
        :root {
            --dark-blue: #1d2a55;
            --light-green: #8bc655;
            /* التعديل: جعل الخلفية أدكن بدرجتين إضافيتين لمظهر أكثر فخامة وتباين */
            --bg-darker: #cbd5cb; 
        }

        *, *::before, *::after {
            box-sizing: border-box;
        }

        @page {
            size: A6;
            margin: 0;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
            background-color: var(--bg-darker);
        }

        /* الهيكل العام للبطاقة بمقاس A6 الحقيقي */
        .card-page {
            width: 105mm;
            height: 148mm;
            position: relative;
            page-break-after: always;
            overflow: hidden;
            background-color: var(--bg-darker);
            /* هوامش وظلال للمعاينة داخل المتصفح فقط وتختفي عند حفظ PDF */
            box-shadow: 0 0 15px rgba(0,0,0,0.15);
            margin: 20px auto; 
        }

        @media print {
            .card-page {
                margin: 0;
                box-shadow: none;
            }
        }

        /* ------------------ الوجه الأمامي (FRONT) ------------------ */
        .front-card {
            padding: 12mm 8mm;
            text-align: center;
            display: block;
        }

        .logo-area {
            margin-bottom: 8mm;
            text-align: center;
        }

        .logo-area img {
            width: 50mm;
            height: auto;
        }

        .text-container {
            margin-bottom: 6mm;
        }

        .text-top {
            color: var(--dark-blue);
            font-size: 15pt;
            font-weight: bold;
            margin-bottom: 4mm;
            line-height: 1.3;
        }

        .text-middle {
            color: var(--dark-blue);
            font-size: 10.5pt;
            line-height: 1.4;
        }

        /* حاوية الباركود */
        .qr-area {
            text-align: center;
            margin-bottom: 6mm;
        }

        .qr-container {
            background-color: #ffffff;
            padding: 4mm;
            border-radius: 12px;
            border: 2px solid var(--light-green);
            display: inline-block;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .qr-container img {
            width: 32mm;
            height: 32mm;
            display: block;
        }

        .text-bottom {
            color: var(--dark-blue); /* تحويل هذا النص للأزرق الداكن ليظهر بوضوح احترافي فوق الخلفية الأدكن */
            font-size: 14pt;
            font-weight: bold;
            letter-spacing: 0.5px;
            text-align: center;
        }

        /* ------------------ الوجه الخلفي (BACK) ------------------ */
        .back-card {
            background-image: url('hero.jpg');
            background-size: 90% auto;
            background-position: center center;
            background-repeat: no-repeat;
        }
    </style>
</head>
<body>

    <!-- 1. الوجه الأمامي للبطاقة (FRONT) -->
    <div class="card-page front-card">
        <div class="logo-area">
            <img src="Logo.png" alt="Plumeria Service Logo">
        </div>

        <div class="text-container">
            <div class="text-top">Sie waren mit uns zufrieden?</div>
            <div class="text-middle">Wir freuen uns über Ihr Feedback auf unserer Google Seite.</div>
        </div>

        <div class="qr-area">
            <div class="qr-container">
                <img src="qr-code.png" alt="Google QR Code">
            </div>
        </div>

        <div class="text-bottom">Vielen Dank!</div>
    </div>

    <!-- 2. الوجه الخلفي للبطاقة (BACK) -->
    <div class="card-page back-card">
    </div>

</body>
</html>
